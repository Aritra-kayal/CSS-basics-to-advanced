<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./asset/logo.jpeg" />
    <title>StayNest | Holiday rentals,cabins,beach,houses & more</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="hero">
      <div class="navbar">
        <div class="brand">
          <img src="./asset/Brandlogo.png" alt="brand logo nad name" />
          <p>StayNest</p>
        </div>
        <div class="search">
          <div class="any-where">
            <i class="fa-solid fa-location-dot"></i>
            <a href="#">Anywhere</a>
          </div>
          <div class="any-week">
            <i class="fa-regular fa-calendar"></i>
            <a href="#">Any week</a>
          </div>
          <div class="add-guests">
            <a href="#">Add guests</a>
            <div class="searchLogo">
              <i class="fa-solid fa-magnifying-glass"></i>
            </div>
          </div>
        </div>
        <div class="login-box">
          <div class="host">
            <i class="fa-regular fa-house"></i>
            <a href="#">Host your home</a>
          </div>
          <div class="login">
            <a href="#">Login</a>
          </div>
          <button class="sign-up"><a href="#">Sign Up</a></button>
          <div class="user-icon">
            <i class="fa-regular fa-user"></i>
          </div>
        </div>
      </div>
      <div class="hero-main">
        <div class="hero-color"></div>
      </div>
    </div>
  </body>
</html>
